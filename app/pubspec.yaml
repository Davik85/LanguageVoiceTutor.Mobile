name: language_voice_tutor_mobile
description: Android-first Flutter client skeleton for Language Voice Tutor.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  flutter_local_notifications: ^22.1.0
  flutter_timezone: ^5.1.0
  just_audio: ^0.9.42
  record: ^7.1.1
  permission_handler: ^12.0.3
  timezone: ^0.11.1
  in_app_purchase: ^3.3.0
  in_app_purchase_android: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/brand/lvt-logo.png
    - assets/avatars/lesson_chat/lana/
    - assets/avatars/lesson_chat/nelli/
    - assets/avatars/lesson_chat/david/
    - assets/avatars/conversation_mode/lana/
    - assets/avatars/conversation_mode/nelli/
    - assets/avatars/conversation_mode/david/
    - assets/achievements/
